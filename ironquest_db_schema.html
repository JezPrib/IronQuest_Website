
<style>
#erd-container { padding: 1rem 0; }
#erd-container svg { width: 100%; }
</style>
<h2 class="sr-only">IronQuest database schema — entity relationship diagram showing all core tables and their relationships</h2>
<div id="erd-container"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  USERS ||--o{ CHARACTERS : owns
  USERS ||--o{ COACH_CLIENTS : "is coach"
  USERS ||--o{ COACH_CLIENTS : "is client"
  CHARACTERS ||--o{ DAILY_CHECKINS : submits
  CHARACTERS ||--o{ CHARACTER_QUESTS : has
  CHARACTERS ||--o{ LEVEL_HISTORY : logs
  QUESTS ||--o{ CHARACTER_QUESTS : assigned_via
  USERS ||--o{ QUESTS : "coach creates"

  USERS {
    uuid id PK
    string email
    string password_hash
    enum role "coach | client"
    string display_name
    timestamp created_at
  }
  CHARACTERS {
    uuid id PK
    uuid user_id FK
    string hero_name
    string class "Warrior | Ranger | Mage | Paladin"
    int level
    int current_exp
    int exp_to_next
    int str_stat
    int agi_stat
    int end_stat
    int vit_stat
    int gold
    string avatar_url
    timestamp created_at
  }
  COACH_CLIENTS {
    uuid id PK
    uuid coach_id FK
    uuid client_id FK
    enum status "active | paused | ended"
    timestamp joined_at
  }
  QUESTS {
    uuid id PK
    uuid created_by FK
    string title
    text description
    enum type "daily | weekly | raid | bounty"
    enum stat_reward "STR | AGI | END | VIT | ALL"
    int exp_reward
    int gold_reward
    boolean is_template
    timestamp created_at
  }
  CHARACTER_QUESTS {
    uuid id PK
    uuid character_id FK
    uuid quest_id FK
    enum status "active | completed | failed | skipped"
    date assigned_date
    date due_date
    timestamp completed_at
    int times_completed
  }
  DAILY_CHECKINS {
    uuid id PK
    uuid character_id FK
    date check_date
    decimal body_weight_kg
    enum mood "1 | 2 | 3 | 4 | 5"
    int steps
    int sleep_hours
    int calories
    int protein_g
    int carbs_g
    int fats_g
    text coach_notes
    timestamp submitted_at
  }
  LEVEL_HISTORY {
    uuid id PK
    uuid character_id FK
    int from_level
    int to_level
    string title_unlocked
    timestamp leveled_at
  }
`);
document.getElementById('erd-container').innerHTML = svg;
document.querySelectorAll('#erd-container svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd-container svg.erDiagram .row-rect-odd path, #erd-container svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
